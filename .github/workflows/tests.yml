name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest tests/ -q
      - name: Compile-check modules
        run: python -m py_compile watcher.py fetch.py relevance.py state.py notify.py
