name: Riftbound Watch

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        default: dry-run
        options:
          - dry-run
          - test-webhook
          - watch
          - status-report
          - heartbeat
  schedule:
    # Every 2 hours: run the watch and only post to Discord on new hits.
    - cron: "0 */2 * * *"
    # Daily at 09:00 UTC: heartbeat -- one short liveness message, no links,
    # no state write (just proves the automation is still alive).
    - cron: "0 9 * * *"

permissions:
  contents: read

concurrency:
  group: riftbound-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      # A manual dispatch uses its chosen input. Otherwise the schedule decides:
      # the daily 09:00 UTC cron -> heartbeat (short liveness, no links, no state);
      # every other schedule (the 2-hourly cron) -> notify-only watch (posts only on new hits).
      MODE: ${{ github.event.inputs.mode || (github.event.schedule == '0 9 * * *' && 'heartbeat') || 'watch' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install runtime dependencies
        run: pip install -r requirements.txt
      - name: Restore watcher state
        uses: actions/cache/restore@v4
        with:
          path: state.json
          key: riftbound-state-${{ github.run_id }}
          restore-keys: |
            riftbound-state-
      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WATCH_TARGETS: "https://merch.riotgames.com/de-de/category/riftbound/,https://merch.riotgames.com/de-de/category/riftbound/?page=1&sort=dateDesc"
        run: |
          set -euo pipefail
          echo "Running watcher in mode: ${MODE}"
          case "${MODE}" in
            dry-run)       python watcher.py --dry-run ;;
            test-webhook)  python watcher.py --test-webhook-random-riftbound ;;
            watch)         python watcher.py ;;
            status-report) python watcher.py --status-report ;;
            heartbeat)     python watcher.py --heartbeat ;;
            *) echo "Unknown mode: ${MODE}" >&2; exit 1 ;;
          esac
      - name: Save watcher state
        if: ${{ always() && env.MODE == 'watch' }}
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: riftbound-state-${{ github.run_id }}
